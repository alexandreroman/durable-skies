services:
  temporal:
    image: temporalio/temporal
    container_name: temporal
    command: server start-dev --ip 0.0.0.0
    ports:
      - "7233:7233"
      - "8233:8233"
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  worker:
    build:
      context: ./backend
    image: durable-skies-backend
    env_file:
      - .env
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      REDIS_URL: redis://redis:6379/0
    depends_on:
      temporal:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  api:
    # Same build as worker. The shared `image:` tag lets Compose reuse the
    # cached image layers instead of building twice.
    build:
      context: ./backend
    image: durable-skies-backend
    command: ["durable-skies-api"]
    env_file:
      - .env
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      REDIS_URL: redis://redis:6379/0
    depends_on:
      temporal:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    # Evaluated in the user's browser, so localhost points to the host.
    environment:
      NUXT_PUBLIC_API_BASE: "http://localhost:8000"
    depends_on:
      - api
    ports:
      - "3000:3000"
    restart: unless-stopped
